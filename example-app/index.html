<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>@capgo/capacitor-persistent-uuid Example</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <main class="container">
      <h1>@capgo/capacitor-persistent-uuid</h1>
      <p class="lead">Validate persistent UUID creation and reset behavior.</p>

      <label for="uuid-scope">Scope</label>
      <input id="uuid-scope" type="text" placeholder="Defaults to native package or bundle id" />

      <div class="actions">
        <button id="get-id">Get ID</button>
        <button id="reset-id">Reset ID</button>
        <button id="get-version">Get plugin version</button>
      </div>

      <pre id="plugin-output">Press a button to run an action.</pre>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
